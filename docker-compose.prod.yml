services:
  redis:
    image: redis:7-alpine
    container_name: nexshop-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # ports:
    #   - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    container_name: nexshop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-blue:
    image: ghcr.io/${GITHUB_USER}/nexshop:${IMAGE_TAG:-latest}
    container_name: nexshop-blue
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_COLOR: blue
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexshop-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

  app-green:
    image: ghcr.io/${GITHUB_USER}/nexshop:${IMAGE_TAG:-latest}
    container_name: nexshop-green
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      APP_COLOR: green
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexshop-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:

networks:
  nexshop-network:

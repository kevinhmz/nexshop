services:
  redis:
    image: redis:7-alpine
    container_name: nexshop-redis
    restart: unless-stopped
    env_file:
      - .env.runtime
    command: sh -c 'redis-server --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexshop-network

  db:
    image: postgres:16-alpine
    container_name: nexshop-db
    restart: unless-stopped
    env_file:
      - .env.runtime
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexshop-network

  app-blue:
    image: ${APP_IMAGE_BLUE}
    container_name: nexshop-blue
    restart: unless-stopped
    env_file:
      - .env.runtime
    environment:
      APP_COLOR: blue
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexshop-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

  app-green:
    image: ${APP_IMAGE_GREEN}
    container_name: nexshop-green
    restart: unless-stopped
    env_file:
      - .env.runtime
    environment:
      APP_COLOR: green
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexshop-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m

volumes:
  postgres_data:
  redis_data:

networks:
  nexshop-network:

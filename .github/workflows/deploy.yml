name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Nexshop repo
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${IMAGE_NAME}:${SHORT_SHA}"

          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "IMAGE=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Notify deployment started
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚀 Nexshop deployment started"
          SLACK_MESSAGE: |
            Starting deployment to production
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ steps.meta.outputs.IMAGE }}
            Author: ${{ github.actor }}
          SLACK_COLOR: "#FFA500"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.IMAGE }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.IMAGE_NAME }}:latest

      - name: Checkout Ansible repository
        uses: actions/checkout@v4
        with:
          repository: kevinhmz/deployments
          path: ansible-playbooks
          token: ${{ secrets.GH_PAT }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Run Ansible deploy playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible-playbooks/playbooks/deploy-nexshop.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --inventory ansible-playbooks/inventory/hosts.yml
            --extra-vars "image=${{ steps.meta.outputs.IMAGE }} app_repo_dir=${{ github.workspace }} app_dir=/opt/nexshop"

      - name: Notify deployment success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "✅ Nexshop deployment successful"
          SLACK_MESSAGE: |
            Deployment completed successfully
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ steps.meta.outputs.IMAGE }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_COLOR: "#36a64f"

      - name: Notify deployment failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "❌ Nexshop deployment failed"
          SLACK_MESSAGE: |
            Deployment failed
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ steps.meta.outputs.IMAGE }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_COLOR: "#dc3545"

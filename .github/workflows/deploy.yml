name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.img.outputs.image }}

    steps:
      - name: Checkout Nexshop repo
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Resolve primary image tag
        id: img
        run: echo "image=$(printf '%s' '${{ steps.meta.outputs.tags }}' | head -n1)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/prod.Dockerfile
          target: production
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Nexshop repo
        uses: actions/checkout@v4

      - name: Notify deployment started
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚀 Nexshop deployment started"
          SLACK_MESSAGE: |
            Starting deployment to production
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ needs.build-and-push.outputs.image }}
            Author: ${{ github.actor }}
          SLACK_COLOR: "#FFA500"

      - name: Checkout Ansible repository
        uses: actions/checkout@v4
        with:
          repository: kevinhmz/deployments
          path: ansible-playbooks
          token: ${{ secrets.GH_PAT }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Run Ansible deploy playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible-playbooks/playbooks/deploy-nexshop.yml
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --inventory ansible-playbooks/inventory/hosts.yml
            --extra-vars "image=${{ needs.build-and-push.outputs.image }} app_repo_dir=${{ github.workspace }} app_dir=/opt/nexshop"

      - name: Notify deployment success
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "✅ Nexshop deployment successful"
          SLACK_MESSAGE: |
            Deployment completed successfully
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ needs.build-and-push.outputs.image }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_COLOR: "#36a64f"

      - name: Notify deployment failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "❌ Nexshop deployment failed"
          SLACK_MESSAGE: |
            Deployment failed
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Image: ${{ needs.build-and-push.outputs.image }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_COLOR: "#dc3545"
